name: screen_control
description: A Flutter plugin for controlling screen on/off functionality for mawaqit boxes and tablets
version: 0.0.1
homepage: https://your-repository-url

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.screen_control
        pluginClass: ScreenControlPlugin
